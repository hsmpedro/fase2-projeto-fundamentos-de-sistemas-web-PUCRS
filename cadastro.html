    <h3 style="text-align: center; margin-top: 30px;">Faça seu cadastro</h3>
    <div class="formulario">
        <form>
            <h5>Informações sobre o tutor</h5>
            <br>
            <p>Nome: <input type="text" name="" id=""></p>
            <p>Endereço: <input type="text" name="" id=""></p>
            <p>CPF: <input type="number" name="" id=""></p>
            <p>Sexo: Feminino <input type="checkbox" name="" id=""> Masculino <input type="checkbox" name="" id=""></p>
            <p>Telefone: <input type="number" name="" id=""></p>
            <p>Email: <input type="email" name="" id=""></p>
            <br>
            <h5>Informações sobre o pet</h5>
            <br>
            <p>Nome do pet: <input type="text" name="" id=""></p>
            <p>Raça do pet: <input type="text" name="" id=""></p>
            <p>Idade do pet: <input type="text" name="" id=""></p>
        </form>
        <div class="botao">
            <button href="index.html">Confirmar cadastro</button>
        </div>  
    </div>
